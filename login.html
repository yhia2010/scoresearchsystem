<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教师登录 - 新安中学成绩管理系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a5c3a;
      --primary-light: #2e8b57;
      --primary-dark: #0f3d26;
      --secondary: #3aaa6e;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --bg: #f0f4f2;
      --bg-card: #ffffff;
      --text: #0f1a12;
      --text-muted: #3d5a47;
      --border: #c8dfd1;
      --shadow: 0 4px 24px rgba(26,92,58,0.10);
      --shadow-lg: 0 12px 40px rgba(26,92,58,0.15);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .anim-fade-up { animation: fadeInUp 0.5s ease-out both; }

    /* ===== NAVBAR ===== */
    .navbar {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
      color: #fff;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 20px rgba(26,92,58,0.3);
      position: sticky; top: 0; z-index: 100;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 12px;
      font-size: 1.1rem; font-weight: 700; letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .navbar-brand svg { width: 28px; height: 28px; }
    .navbar-tabs { display: flex; gap: 4px; }
    .nav-tab {
      padding: 8px 18px; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; font-weight: 500; transition: all 0.25s;
      background: transparent; color: rgba(255,255,255,0.75); border: none;
    }
    .nav-tab:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-tab.active { background: rgba(255,255,255,0.2); color: #fff; }

    /* ===== LOGIN PAGE ===== */
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--secondary) 100%);
      position: relative;
      overflow: hidden;
    }
    .login-container::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(255,255,255,0.06) 0%, transparent 50%);
    }
    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(26,92,58,0.3);
    }
    .login-icon svg {
      width: 32px;
      height: 32px;
      color: #fff;
    }
    .login-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .login-header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Form styles */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.975rem;
      font-family: inherit;
      color: var(--text);
      background: #f8fafc;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 4px rgba(46,139,87,0.12);
      background: #fff;
    }
    .form-input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* Password visibility toggle */
    .password-wrapper {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .password-toggle:hover {
      color: var(--primary);
    }
    .password-wrapper .form-input {
      padding-right: 44px;
    }

    /* Button styles */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--radius-sm);
      font-size: 0.975rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.25s;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .btn:hover::after { opacity: 1; }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
      box-shadow: 0 4px 16px rgba(26,92,58,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(26,92,58,0.4);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .btn-full { width: 100%; }

    /* Alert styles */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: fadeInUp 0.3s ease-out;
    }
    .alert.show { display: flex; }
    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
    .alert-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    /* Loading spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-muted);
      font-size: 0.8rem;
      background: var(--bg);
    }
    .footer a { color: var(--primary); text-decoration: none; }

    /* Back link */
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--primary); }
    .back-link svg { transition: transform 0.2s; }
    .back-link:hover svg { transform: translateX(-4px); }

    /* Firebase status */
    .firebase-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-top: 16px;
    }
    .firebase-status.connected { background: #dcfce7; color: #166534; }
    .firebase-status.disconnected { background: #fee2e2; color: #991b1b; }
    .firebase-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .firebase-status.connected .dot { background: #22c55e; }
    .firebase-status.disconnected .dot { background: #ef4444; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <img src="logo.png" alt="校徽" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.3); vertical-align: middle; margin-right: 10px;">
      新安中学2023级高三学生历年成绩查询系统
    </div>
    <div class="navbar-tabs">
      <button class="nav-tab" onclick="location.href='index.html'">成绩查询</button>
      <button class="nav-tab active">教师登录</button>
    </div>
  </nav>

  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card anim-fade-up">
      <div class="login-header">
        <div class="login-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h1>教师登录</h1>
        <p>请输入您的管理员账号和密码</p>
      </div>

      <!-- Alert -->
      <div id="alert" class="alert">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alert-text"></span>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">邮箱地址</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="输入您的邮箱"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="password-wrapper">
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="输入您的密码"
              required
              autocomplete="current-password"
            >
            <button type="button" class="password-toggle" onclick="togglePassword()">
              <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          <span id="btn-text">登录</span>
        </button>
      </form>

      <div style="text-align: center;">
        <div id="firebase-status" class="firebase-status disconnected">
          <span class="dot"></span>
          <span id="status-text">连接中...</span>
        </div>
      </div>

      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m15 18-6-6 6-6"/>
        </svg>
        返回成绩查询
      </a>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>新安中学2023级高三学生历年成绩查询系统 | 博学笃志，明礼诚信 | 仅限授权教师访问</p>
  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDNDeDnQTv3CX9XkUu1arTcmLhLBZLl0tQ",
      authDomain: "score-80938.firebaseapp.com",
      databaseURL: "https://score-80938-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "score-80938",
      storageBucket: "score-80938.firebasestorage.app",
      messagingSenderId: "941938185687",
      appId: "1:941938185687:web:b6d5a11c88a65660b4e792"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // DOM Elements
    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const btnText = document.getElementById('btn-text');
    const alertEl = document.getElementById('alert');
    const alertText = document.getElementById('alert-text');
    const firebaseStatus = document.getElementById('firebase-status');
    const statusText = document.getElementById('status-text');

    // Check Firebase connection
    function checkFirebaseConnection() {
      try {
        if (firebase.apps.length > 0) {
          firebaseStatus.classList.remove('disconnected');
          firebaseStatus.classList.add('connected');
          statusText.textContent = '已连接';
        }
      } catch (error) {
        firebaseStatus.classList.remove('connected');
        firebaseStatus.classList.add('disconnected');
        statusText.textContent = '连接失败';
      }
    }

    // Check if already logged in
    auth.onAuthStateChanged((user) => {
      if (user) {
        // Already logged in, redirect to admin
        window.location.href = 'admin.html';
      } else {
        checkFirebaseConnection();
      }
    });

    // Toggle password visibility
    function togglePassword() {
      const input = passwordInput;
      const eyeIcon = document.getElementById('eye-icon');
      
      if (input.type === 'password') {
        input.type = 'text';
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      } else {
        input.type = 'password';
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    }

    // Show alert
    function showAlert(message, type = 'error') {
      alertText.textContent = message;
      alertEl.className = `alert alert-${type} show`;
      
      setTimeout(() => {
        alertEl.classList.remove('show');
      }, 5000);
    }

    // Set loading state
    function setLoading(isLoading) {
      if (isLoading) {
        loginBtn.disabled = true;
        btnText.innerHTML = '<span class="spinner"></span> 登录中...';
      } else {
        loginBtn.disabled = false;
        btnText.textContent = '登录';
      }
    }

    // Handle form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showAlert('请输入邮箱和密码');
        return;
      }

      setLoading(true);

      try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        console.log('Login successful:', userCredential.user.email);
        
        showAlert('登录成功！正在跳转...', 'success');
        
        // Redirect to admin page after short delay
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 1000);
        
      } catch (error) {
        console.error('Login error:', error);
        
        let errorMessage = '登录失败，请检查账号密码';
        
        switch (error.code) {
          case 'auth/user-not-found':
            errorMessage = '用户不存在，请检查邮箱是否正确';
            break;
          case 'auth/wrong-password':
            errorMessage = '密码错误，请重试';
            break;
          case 'auth/invalid-email':
            errorMessage = '邮箱格式不正确';
            break;
          case 'auth/too-many-requests':
            errorMessage = '登录尝试次数过多，请稍后再试';
            break;
          case 'auth/invalid-credential':
            errorMessage = '邮箱或密码错误';
            break;
        }
        
        showAlert(errorMessage);
        setLoading(false);
      }
    });
  </script>
</body>
</html>
