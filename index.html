<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新安中学2023级高三学生历年成绩查询系统</title>
  <style>
    :root {
      --primary: #16a34a;
      --primary-dark: #15803d;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #f59e0b;
      --green: #22c55e;
      --amber: #f59e0b;
      --sky: #0ea5e9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .navbar { background: var(--primary); padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
    .navbar-brand { color: white; font-weight: 700; font-size: 1.1rem; }
    .page { display: none; }
    .page.active { display: block; }
    .hero { text-align: center; padding: 32px 16px 16px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-radius: 0 0 24px 24px; }
    .hero h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .hero p { font-size: 0.875rem; opacity: 0.9; }
    .query-section { max-width: 480px; margin: -20px auto 24px; padding: 0 16px; position: relative; z-index: 10; }
    .card { background: var(--card-bg); border-radius: 16px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--primary); }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
    .form-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.95rem; transition: border-color 0.2s; outline: none; }
    .form-input:focus { border-color: var(--primary); }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .error-msg { color: #dc2626; font-size: 0.85rem; margin-top: 10px; padding: 8px 12px; background: #fef2f2; border-radius: 8px; display: none; }
    .error-msg.show { display: block; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .loading-overlay.hidden { display: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-muted); font-size: 0.9rem; }

    /* Results */
    #results { display: none; padding: 0 16px 40px; max-width: 800px; margin: 0 auto; }
    .student-header { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .student-avatar { width: 52px; height: 52px; background: linear-gradient(135deg, var(--primary), var(--sky)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; font-weight: 700; flex-shrink: 0; }
    .student-info h2 { font-size: 1.2rem; margin-bottom: 2px; }
    .student-info p { font-size: 0.8rem; color: var(--text-muted); }
    .student-stats { display: flex; gap: 12px; margin-left: auto; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.7rem; color: var(--text-muted); }

    /* Export button */
    .export-bar { text-align: center; margin-bottom: 16px; }
    .btn-export { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .btn-export:hover { background: #d97706; }

    /* Summary */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .summary-card { background: var(--card-bg); border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
    .summary-card .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
    .summary-card .value { font-size: 1.6rem; font-weight: 700; color: var(--text); }
    .summary-card.green .value { color: var(--green); }
    .summary-card.amber .value { color: var(--amber); }
    .summary-card.sky .value { color: var(--sky); }
    .summary-card .sub { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

    /* Tabs */
    .tabs { display: flex; background: var(--card-bg); border-radius: 12px; padding: 4px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-x: auto; }
    .tab-btn { flex: 1; padding: 8px 12px; border: none; background: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; white-space: nowrap; }
    .tab-btn.active { background: var(--primary); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Score Table */
    .table-wrap { overflow-x: auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 700px; }
    thead th { background: var(--primary); color: white; padding: 10px 8px; text-align: center; font-weight: 600; position: sticky; top: 0; white-space: nowrap; }
    thead th:first-child { border-radius: 12px 0 0 0; text-align: left; }
    thead th:last-child { border-radius: 0 12px 0 0; }
    tbody tr:nth-child(even) { background: #f8faf8; }
    tbody tr:hover { background: #f0fdf4; }
    tbody td { padding: 8px; text-align: center; border-bottom: 1px solid var(--border); }
    tbody td:first-child { text-align: left; font-weight: 500; }
    .score-high { color: var(--green); font-weight: 600; }
    .score-mid { color: var(--amber); }
    .score-low { color: #dc2626; }
    .exam-name { font-weight: 600; color: var(--text); font-size: 0.78rem; }
    .year-tag { font-size: 0.7rem; color: var(--text-muted); background: #f1f5f9; padding: 2px 6px; border-radius: 4px; }
    .rank-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
    .rank-top { background: #fef3c7; color: #92400e; }
    .rank-mid { background: #f0fdf4; color: #166534; }
    .rank-normal { background: #f1f5f9; color: var(--text-muted); }

    /* Disclaimer */
    .disclaimer { background: #fffbeb; border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; color: #92400e; margin-bottom: 16px; line-height: 1.7; }

    /* Responsive */
    @media (max-width: 600px) {
      .hero h1 { font-size: 1.2rem; }
      .student-stats { display: none; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      table { font-size: 0.72rem; }
      tbody td { padding: 6px 4px; }
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">正在加载数据...</div>
  </div>

  <!-- Page: Query -->
  <div id="page-query" class="page active">
    <div class="hero">
      <h1>新安中学2023级高三学生历年成绩查询系统</h1>
      <p>博学笃志，明礼诚信</p>
    </div>
    <div class="query-section">
      <div class="card anim-fade-up">
        <div class="card-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          查询成绩
        </div>
        <div class="disclaimer">本页面非学校官方制作，查询结果仅供家长开具综评成绩单使用，如查询不到成绩，网页管理员不会单独为您添加成绩，切勿烦扰</div>
        <div class="form-group">
          <label class="form-label">身份证号码</label>
          <input type="text" id="id-input" class="form-input" placeholder="输入18位身份证号码（可不填）" maxlength="18">
        </div>
        <div class="form-group">
          <label class="form-label">姓名 *</label>
          <input type="text" id="name-input" class="form-input" placeholder="输入学生姓名">
        </div>
        <div class="form-group">
          <label class="form-label">学年（选填）</label>
          <select id="year-filter" class="form-input">
            <option value="">全部学年</option>
          </select>
        </div>
        <button id="query-btn" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          查询成绩
        </button>
        <div id="error-msg" class="error-msg"></div>
      </div>
    </div>
  </div>

  <!-- Page: Results -->
  <div id="page-results" class="page">
    <div class="hero">
      <h1>查询结果</h1>
      <p>博学笃志，明礼诚信</p>
    </div>
    <div style="padding: 0 16px; max-width: 800px; margin: 0 auto;">
      <div class="student-header" id="student-header"></div>

      <!-- Export -->
      <div class="export-bar">
        <button class="btn-export" id="export-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出成绩单（Excel）
        </button>
      </div>

      <!-- Summary -->
      <div class="summary-grid" id="summary-grid"></div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="table">历次成绩</button>
        <button class="tab-btn" data-tab="trend">趋势分析</button>
        <button class="tab-btn" data-tab="subject">各科详情</button>
        <button class="tab-btn" data-tab="rank">排名情况</button>
      </div>

      <!-- Tab: Table -->
      <div id="tab-table" class="tab-content active">
        <div class="table-wrap" id="table-container"></div>
      </div>

      <!-- Tab: Trend -->
      <div id="tab-trend" class="tab-content">
        <div class="card" style="margin-bottom:12px;">
          <div style="font-size:0.85rem;font-weight:600;margin-bottom:8px;">总分趋势</div>
          <canvas id="trend-chart" height="200"></canvas>
        </div>
        <div class="card">
          <div style="font-size:0.85rem;font-weight:600;margin-bottom:8px;">各科趋势</div>
          <canvas id="subject-trend-chart" height="200"></canvas>
        </div>
      </div>

      <!-- Tab: Subject -->
      <div id="tab-subject" class="tab-content">
        <div class="summary-grid" id="subject-stats"></div>
      </div>

      <!-- Tab: Rank -->
      <div id="tab-rank" class="tab-content">
        <div id="rank-table"></div>
      </div>

      <div style="text-align:center;margin-top:20px;">
        <button class="btn btn-primary" onclick="resetQuery()" style="max-width:300px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
          重新查询
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script>
    let allStudents = [];
    let allScores = [];
    let currentStudent = null;
    let filteredScores = [];
    let trendChart = null;
    let subjectTrendChart = null;

    const SUBJECTS = ['语文', '数学', '英语', '物理', '化学', '生物', '历史', '地理', '政治'];
    const SUBJECT_COLORS = {
      '语文': '#ef4444', '数学': '#3b82f6', '英语': '#22c55e',
      '物理': '#f59e0b', '化学': '#8b5cf6', '生物': '#06b6d4',
      '历史': '#f97316', '地理': '#10b981', '政治': '#ec4899'
    };
    const SUBJECT_COLORS_BG = {
      '语文': '#fef2f2', '数学': '#eff6ff', '英语': '#f0fdf4',
      '物理': '#fffbeb', '化学': '#f5f3ff', '生物': '#ecfeff',
      '历史': '#fff7ed', '地理': '#ecfdf5', '政治': '#fdf2f8'
    };

    // Year order for sorting
    const YEAR_ORDER = {
      '高一上学期': 1, '高一下学期': 2,
      '高二上学期': 3, '高二下学期': 4,
      '高三上学期': 5, '高三下学期': 6
    };

    async function init() {
      try {
        await loadData();
        setupEventListeners();
        hideLoading();
      } catch (error) {
        console.error('Error loading data:', error);
        showError('加载数据失败，请刷新页面重试');
        hideLoading();
      }
    }

    async function loadData() {
      const [studentsResp, scoresResp] = await Promise.all([
        fetch('students.json'),
        fetch('scores.json')
      ]);
      if (!studentsResp.ok) throw new Error('无法加载学生数据');
      if (!scoresResp.ok) throw new Error('无法加载成绩数据');
      allStudents = await studentsResp.json();
      allScores = await scoresResp.json();
      if (allStudents.length === 0 || allScores.length === 0) throw new Error('数据文件为空');

      // Populate year filter
      const years = [...new Set(allScores.map(s => s.year).filter(Boolean))];
      years.sort((a, b) => (YEAR_ORDER[a] || 99) - (YEAR_ORDER[b] || 99));
      const yearFilter = document.getElementById('year-filter');
      if (yearFilter) {
        years.forEach(year => {
          const option = document.createElement('option');
          option.value = year;
          option.textContent = year;
          yearFilter.appendChild(option);
        });
      }
    }

    function setupEventListeners() {
      document.getElementById('query-btn').addEventListener('click', performQuery);
      document.getElementById('id-input').addEventListener('keypress', e => { if (e.key === 'Enter') performQuery(); });
      document.getElementById('name-input').addEventListener('keypress', e => { if (e.key === 'Enter') performQuery(); });

      // Tabs
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
      });

      // Export
      document.getElementById('export-btn').addEventListener('click', exportToExcel);
    }

    function performQuery() {
      const idInput = document.getElementById('id-input').value.trim();
      const nameInput = document.getElementById('name-input').value.trim();
      const yearFilter = document.getElementById('year-filter').value;

      document.getElementById('error-msg').classList.remove('show');

      if (!nameInput) {
        showError('请输入学生姓名');
        return;
      }

      let student = null;
      let scores = [];

      // Priority 1: ID + Name (exact match)
      if (idInput) {
        student = allStudents.find(s => s.idNumber === idInput);
        if (student && student.name !== nameInput) {
          showError('身份证号与姓名不匹配');
          return;
        }
      }

      // Priority 2: Name only (for students without ID)
      if (!student) {
        const matches = allStudents.filter(s => s.name === nameInput);
        if (matches.length === 1) {
          student = matches[0];
        } else if (matches.length > 1) {
          showError('找到 ' + matches.length + ' 名同名的学生，请补充身份证号以精确匹配');
          return;
        } else {
          // Try fuzzy match
          const fuzzyMatches = allStudents.filter(s => s.name.includes(nameInput) || nameInput.includes(s.name));
          if (fuzzyMatches.length === 1) {
            student = fuzzyMatches[0];
          } else if (fuzzyMatches.length > 1) {
            showError('找到 ' + fuzzyMatches.length + ' 名相似的学生，请补充身份证号');
            return;
          }
        }
      }

      if (!student) {
        showError('未找到该学生，请检查姓名是否正确');
        return;
      }

      currentStudent = student;

      // Get scores for this student
      scores = allScores.filter(s => {
        // Match by studentId or studentName
        const idMatch = (student.idNumber && s.studentId === student.idNumber) ||
                         (!student.idNumber && s.studentName === student.name);
        if (!idMatch) return false;
        if (yearFilter && s.year !== yearFilter) return false;
        return true;
      });

      if (scores.length === 0) {
        showError('该学生暂无成绩记录');
        return;
      }

      filteredScores = scores;
      displayResults(student, scores);
      showPage('results');
    }

    function displayResults(student, scores) {
      document.getElementById('error-msg').classList.remove('show');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth' });

      // Header
      const header = document.getElementById('student-header');
      if (header) {
        const examCount = scores.length;
        const bestTotal = Math.max(...scores.map(s => s.totalScore || 0));
        const avgTotal = scores.reduce((sum, s) => sum + (s.totalScore || 0), 0) / scores.length;
        header.innerHTML = `
          <div class="student-avatar">${student.name.charAt(0)}</div>
          <div class="student-info">
            <h2>${student.name}</h2>
            <p>班级: ${student.className || '未分班'}</p>
          </div>
          <div class="student-stats">
            <div class="stat-item"><div class="stat-value">${examCount}</div><div class="stat-label">考试次数</div></div>
            <div class="stat-item"><div class="stat-value">${bestTotal.toFixed(0)}</div><div class="stat-label">最高总分</div></div>
            <div class="stat-item"><div class="stat-value">${avgTotal.toFixed(0)}</div><div class="stat-label">平均分</div></div>
          </div>
        `;
      }

      // Summary
      displaySummary(scores);
      displayScoreTable(scores);
      initTrendChart(scores);
      displaySubjectStats(scores);
      displayRankTable(scores);
    }

    function displaySummary(scores) {
      const sorted = [...scores].sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0));
      const latest = scores[scores.length - 1];
      const best = sorted[0];
      const avg = scores.reduce((sum, s) => sum + (s.totalScore || 0), 0) / scores.length;
      const bestRank = best['总分排名'];

      const grid = document.getElementById('summary-grid');
      grid.innerHTML = `
        <div class="summary-card">
          <div class="label">最新总分</div>
          <div class="value">${(latest.totalScore || 0).toFixed(0)}</div>
          <div class="sub">${latest.examName}</div>
        </div>
        <div class="summary-card green">
          <div class="label">最高总分</div>
          <div class="value">${(best.totalScore || 0).toFixed(0)}</div>
          <div class="sub">${best.examName}</div>
        </div>
        <div class="summary-card amber">
          <div class="label">平均总分</div>
          <div class="value">${avg.toFixed(0)}</div>
          <div class="sub">${scores.length}次考试</div>
        </div>
        <div class="summary-card sky">
          <div class="label">年级排名</div>
          <div class="value">${bestRank ? '第' + bestRank + '名' : 'N/A'}</div>
          <div class="sub">${bestRank && bestRank <= 10 ? '顶尖' : '最佳排名'}</div>
        </div>
      `;
    }

    function displayScoreTable(scores) {
      const container = document.getElementById('table-container');
      if (!container) return;

      // Sort: 高一→高三 chronologically
      const sorted = [...scores].sort((a, b) => {
        const orderA = YEAR_ORDER[a.year] || 99;
        const orderB = YEAR_ORDER[b.year] || 99;
        if (orderA !== orderB) return orderA - orderB;
        return (a.totalScore || 0) - (b.totalScore || 0);
      });

      // Determine which subjects exist in data
      const usedSubjects = SUBJECTS.filter(sub => sorted.some(s => s[sub] !== undefined && s[sub] !== null));

      // Header: 考试名称 | 学年 | 各科 | 总分 | 总分排名
      let html = '<div class="table-wrap"><table><thead><tr>';
      html += '<th>考试名称</th><th>学年</th>';
      usedSubjects.forEach(sub => { html += `<th>${sub}</th>`; });
      html += '<th>总分</th><th>年级排名</th></tr></thead><tbody>';

      sorted.forEach(score => {
        const yearTag = YEAR_ORDER[score.year] ? score.year : score.year;
        html += `<tr>`;
        html += `<td class="exam-name">${score.examName}</td>`;
        html += `<td><span class="year-tag">${yearTag}</span></td>`;

        usedSubjects.forEach(sub => {
          const val = score[sub];
          if (val !== undefined && val !== null) {
            const cls = getScoreClass(val, sub);
            html += `<td><span class="${cls}">${val.toFixed(0)}</span></td>`;
          } else {
            html += `<td>—</td>`;
          }
        });

        html += `<td><strong>${(score.totalScore || 0).toFixed(0)}</strong></td>`;
        const rank = score['总分排名'];
        html += `<td>${rank ? '<span class="rank-badge ' + getRankClass(rank) + '">第' + rank + '名</span>' : '—'}</td>`;
        html += `</tr>`;
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    function displayRankTable(scores) {
      const container = document.getElementById('rank-table');
      const sorted = [...scores].sort((a, b) => (YEAR_ORDER[a.year] || 99) - (YEAR_ORDER[b.year] || 99));
      const usedSubjects = SUBJECTS.filter(sub => sorted.some(s => s[sub + '排名'] !== undefined));

      if (usedSubjects.length === 0) {
        container.innerHTML = '<div class="card"><p style="text-align:center;color:var(--text-muted);padding:20px;">暂无排名数据</p></div>';
        return;
      }

      let html = '<div class="table-wrap"><table><thead><tr><th>考试</th><th>学年</th>';
      usedSubjects.forEach(sub => { html += `<th>${sub}排名</th>`; });
      html += '<th>总分排名</th></tr></thead><tbody>';

      sorted.forEach(score => {
        html += `<tr><td class="exam-name">${score.examName}</td><td><span class="year-tag">${score.year}</span></td>`;
        usedSubjects.forEach(sub => {
          const rank = score[sub + '排名'];
          html += `<td>${rank ? '<span class="rank-badge ' + getRankClass(rank) + '">第' + rank + '名</span>' : '—'}</td>`;
        });
        const tr = score['总分排名'];
        html += `<td>${tr ? '<span class="rank-badge ' + getRankClass(tr) + '">第' + tr + '名</span>' : '—'}</td>`;
        html += `</tr>`;
      });
      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    function displaySubjectStats(scores) {
      const container = document.getElementById('subject-stats');
      const usedSubjects = SUBJECTS.filter(sub => scores.some(s => s[sub] !== undefined && s[sub] !== null));

      let html = '';
      usedSubjects.forEach(sub => {
        const vals = scores.map(s => s[sub]).filter(v => v !== undefined && v !== null);
        const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
        const best = Math.max(...vals);
        const bestScore = scores.find(s => s[sub] === best);
        html += `
          <div class="summary-card">
            <div style="font-weight:700;color:${SUBJECT_COLORS[sub]};margin-bottom:4px;">${sub}</div>
            <div class="label">平均分</div>
            <div class="value">${avg.toFixed(0)}</div>
            <div class="sub">最高: ${best.toFixed(0)}</div>
          </div>
        `;
      });
      container.innerHTML = html || '<p style="text-align:center;color:var(--text-muted);padding:20px;">暂无分科数据</p>';
    }

    function initTrendChart(scores) {
      const sorted = [...scores].sort((a, b) => (YEAR_ORDER[a.year] || 99) - (YEAR_ORDER[b.year] || 99));
      const labels = sorted.map(s => s.examName.length > 8 ? s.examName.slice(0, 6) + '…' : s.examName);
      const totalData = sorted.map(s => s.totalScore);

      const ctx = document.getElementById('trend-chart');
      if (!ctx) return;

      if (trendChart) trendChart.destroy();
      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: '总分',
            data: totalData,
            borderColor: '#16a34a',
            backgroundColor: 'rgba(22,163,74,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 4,
            pointBackgroundColor: '#16a34a'
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: false, title: { display: true, text: '总分' } }
          }
        }
      });

      // Subject trend chart
      const sctx = document.getElementById('subject-trend-chart');
      const usedSubjects = SUBJECTS.filter(sub => sorted.some(s => s[sub] !== undefined));
      if (!usedSubjects.length || !sctx) return;

      if (subjectTrendChart) subjectTrendChart.destroy();
      subjectTrendChart = new Chart(sctx, {
        type: 'line',
        data: {
          labels,
          datasets: usedSubjects.map(sub => ({
            label: sub,
            data: sorted.map(s => s[sub] !== undefined ? s[sub] : null),
            borderColor: SUBJECT_COLORS[sub],
            backgroundColor: SUBJECT_COLORS_BG[sub],
            fill: false,
            tension: 0.3,
            pointRadius: 3
          }))
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
          scales: {
            y: { beginAtZero: false }
          }
        }
      });
    }

    function exportToExcel() {
      if (!currentStudent || !filteredScores.length) {
        showError('请先查询成绩');
        return;
      }

      const sorted = [...filteredScores].sort((a, b) => (YEAR_ORDER[a.year] || 99) - (YEAR_ORDER[b.year] || 99));
      const usedSubjects = SUBJECTS.filter(sub => sorted.some(s => s[sub] !== undefined));

      // Build CSV
      const headers = ['考试名称', '学年', ...usedSubjects, '总分', '总分年级排名'];
      const rows = sorted.map(s => {
        const row = [s.examName, s.year];
        usedSubjects.forEach(sub => { row.push(s[sub] !== undefined ? s[sub].toFixed(2) : ''); });
        row.push(s.totalScore !== undefined ? s.totalScore.toFixed(2) : '');
        row.push(s['总分排名'] || '');
        return row;
      });

      // Escape CSV values
      const escape = v => {
        const str = String(v);
        if (str.includes(',') || str.includes('"') || str.includes('\n')) {
          return '"' + str.replace(/"/g, '""') + '"';
        }
        return str;
      };

      let csv = '\uFEFF'; // BOM for Excel UTF-8
      csv += headers.map(escape).join(',') + '\n';
      rows.forEach(row => {
        csv += row.map(escape).join(',') + '\n';
      });

      // Download
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${currentStudent.name}_成绩单.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + pageId).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuery() {
      showPage('query');
      document.getElementById('id-input').value = '';
      document.getElementById('name-input').value = '';
      document.getElementById('year-filter').value = '';
      document.getElementById('error-msg').classList.remove('show');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideLoading() {
      document.getElementById('loading').classList.add('hidden');
    }

    function getScoreClass(val, sub) {
      // 物理/化学/生物 (100分制) / 语数英 (150分制)
      const max = ['语文', '数学', '英语'].includes(sub) ? 150 : 100;
      const ratio = val / max;
      if (ratio >= 0.85) return 'score-high';
      if (ratio >= 0.7) return 'score-mid';
      return 'score-low';
    }

    function getRankClass(rank) {
      if (rank <= 10) return 'rank-top';
      if (rank <= 100) return 'rank-mid';
      return 'rank-normal';
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
